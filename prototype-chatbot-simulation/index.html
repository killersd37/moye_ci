<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Moyé – Simulation locale (prototype)</title>
  <style>
    * { box-sizing: border-box; }
    html { -webkit-text-size-adjust: 100%; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(180deg, #FDF8F0 0%, #F5E6C8 50%, #EDD28F 100%);
      color: #1A1008;
      padding-bottom: env(safe-area-inset-bottom, 0);
    }
    .container {
      max-width: 100%;
      margin: 0 auto;
      padding: 1rem;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    @media (min-width: 640px) {
      .container { max-width: 560px; padding: 1.25rem; }
    }
    @media (min-width: 1024px) {
      .container { max-width: 640px; padding: 1.5rem; }
    }
    h1 { font-size: 1.15rem; color: #5C4A2A; margin-bottom: 0.5rem; }
    @media (min-width: 640px) { h1 { font-size: 1.35rem; } }
    .subtitle { font-size: 0.7rem; color: #8B6914; margin-bottom: 1rem; }
    @media (min-width: 640px) { .subtitle { font-size: 0.8rem; } }
    .messages { flex: 1; overflow-y: auto; padding: 0.5rem 0; -webkit-overflow-scrolling: touch; }
    .msg { margin-bottom: 0.75rem; display: flex; gap: 0.5rem; align-items: flex-start; }
    .msg.user { flex-direction: row-reverse; }
    .msg .bubble {
      max-width: 85%; padding: 0.6rem 0.9rem; border-radius: 1rem; font-size: 0.875rem; line-height: 1.45;
      word-wrap: break-word;
    }
    @media (min-width: 640px) {
      .msg .bubble { max-width: 75%; padding: 0.75rem 1rem; font-size: 0.9rem; }
    }
    .msg.user .bubble { background: #8B6914; color: #FDF3DC; }
    .msg.assistant .bubble { background: rgba(255,255,255,0.9); border: 1px solid rgba(200,150,12,0.2); }
    .reflexion-bar {
      display: flex; align-items: center; gap: 0.5rem; padding: 0.5rem 0.75rem;
      background: rgba(139,105,20,0.1); border: 1px solid rgba(139,105,20,0.2); border-radius: 0.5rem;
      margin-top: 0.5rem; flex-wrap: wrap;
    }
    .reflexion-bar button {
      background: #8B6914; color: #FDF3DC; border: none; padding: 0.4rem 0.75rem;
      border-radius: 0.5rem; font-size: 0.75rem; font-weight: 600; cursor: pointer;
    }
    .reflexion-bar button:hover { background: #A07820; }
    .reflexion-bar button:disabled { opacity: 0.6; cursor: not-allowed; }
    .form { display: flex; gap: 0.5rem; padding: 0.75rem 0; }
    .form input {
      flex: 1; min-width: 0; padding: 0.6rem 0.9rem; border: 1px solid rgba(139,105,20,0.3);
      border-radius: 0.75rem; font-size: 0.9rem; background: rgba(255,255,255,0.9);
    }
    @media (min-width: 640px) { .form input { padding: 0.7rem 1rem; } }
    .form button {
      padding: 0.6rem 1rem; background: #8B6914; color: #FDF3DC; border: none;
      border-radius: 0.75rem; font-weight: 600; cursor: pointer; flex-shrink: 0;
    }
    .form button:hover { background: #A07820; }
    .form button:disabled { opacity: 0.5; cursor: not-allowed; }
    @media (min-width: 640px) { .form button { padding: 0.7rem 1.25rem; } }
    .loading { font-size: 0.85rem; color: #5C4A2A; }
    .bubble.loading { animation: pulse-opacity 1.2s ease-in-out infinite; }
    @keyframes pulse-opacity { 0%, 100% { opacity: 0.85; } 50% { opacity: 1; } }
    .error { background: #FEF3C7; border: 1px solid #F59E0B; color: #92400E; padding: 0.5rem; border-radius: 0.5rem; font-size: 0.85rem; margin-bottom: 0.5rem; }
  </style>
</head>
<body>
  <div class="container">
    <h1>La Lumière Moyé – Simulation locale</h1>
    <p class="subtitle">Réponses locales (JSON) · Bouton « Réflexion Profonde » pour Ollama</p>

    <div class="messages" id="messages">
      <div class="msg assistant">
        <div class="bubble">Akwaba  Je suis la Lumière Moyé. Pose une question sur les ethnies ivoiriennes.</div>
      </div>
    </div>

    <div id="reflexionBar" class="reflexion-bar" style="display: none;">
      <span style="font-size: 0.75rem; color: #5C4A2A;">Réponse plus détaillée avec Ollama</span>
      <button type="button" id="btnReflexion">Réflexion Profonde</button>
    </div>

    <div id="error" class="error" style="display: none;"></div>

    <form class="form" id="form">
      <input type="text" id="input" placeholder="Ex: Qui sont les Baoulé ?" autocomplete="off" />
      <button type="submit" id="btnSend">Envoyer</button>
    </form>
  </div>

  <!-- Base Q/A embarquée pour fonctionnement autonome (sinon charger ethnies-qa.json via serveur) -->
  <script>
    // ========== CONFIGURATION ==========
    // Message affiché lorsqu'aucune correspondance locale n'est trouvée
    const NO_MATCH_SUGGESTION = "Je n'ai pas cette réponse localement. Voulez-vous basculer sur le modèle Ollama pour une réponse plus détaillée ?";

    // Base de questions-réponses (ethnies Côte d'Ivoire). En production, charger depuis un fichier JSON.
    const LOCAL_QA = [
      // ================= ORIGINES BAOULE =================

{ question: "D'où viennent les Baoulé", answer: "Les Baoulé sont issus du groupe Akan venant du Ghana actuel. Ils ont migré au XVIIIe siècle vers le centre de la Côte d'Ivoire." },

{ question: "Pourquoi les Baoulé ont quitté le Ghana", answer: "Ils ont quitté le Ghana à cause d'une crise de succession dans le royaume Ashanti." },

{ question: "Qui était la reine des Baoulé", answer: "La reine Abla Pokou est la figure fondatrice des Baoulé." },

{ question: "Que signifie Baoulé", answer: "Baoulé signifie selon la tradition 'l'enfant est mort', en référence au sacrifice légendaire d'Abla Pokou." },

{ question: "Comment est organisée la société Baoulé", answer: "La société Baoulé est matrilinéaire et organisée autour de chefferies traditionnelles." },

{ question: "Quel est le rôle du chef chez les Baoulé", answer: "Le chef Baoulé assure la cohésion sociale, la justice coutumière et les rites traditionnels." },

// ================= ORIGINES SENOUFO =================

{ question: "D'où viennent les Sénoufo", answer: "Les Sénoufo seraient originaires des régions entre le Mali et le Burkina Faso avant de s'installer dans le nord ivoirien." },

{ question: "Quelle est la capitale culturelle Sénoufo", answer: "Korhogo est considérée comme la capitale culturelle des Sénoufo." },

{ question: "Comment fonctionne la société Sénoufo", answer: "La société Sénoufo est structurée autour du Poro, une société d'initiation masculine." },

{ question: "Quel est le rôle du Poro", answer: "Le Poro encadre l'éducation, la spiritualité et la transmission des valeurs chez les Sénoufo." },

// ================= ORIGINES BETE =================

{ question: "D'où viennent les Bété", answer: "Les Bété appartiennent au groupe Krou et seraient issus d'anciennes migrations venant de l'ouest africain." },

{ question: "Dans quelle région vivent les Bété", answer: "Les Bété vivent principalement dans le sud-ouest ivoirien autour de Gagnoa et Daloa." },

{ question: "Comment est organisée la société Bété", answer: "La société Bété est organisée autour de chefferies locales et de conseils d'anciens." },

// ================= ORIGINES YACOUBA =================

{ question: "Qui sont les Yacouba", answer: "Les Yacouba, aussi appelés Dan, vivent dans l'ouest montagneux de la Côte d'Ivoire." },

{ question: "Pourquoi les Yacouba sont connus", answer: "Ils sont célèbres pour leurs masques Dan et leurs traditions de chasse." },

// ================= ORIGINES DIOULA =================

{ question: "Quel est le rôle historique des Dioula", answer: "Les Dioula sont historiquement des commerçants qui ont diffusé l'islam et le commerce en Afrique de l'Ouest." },

{ question: "Où se situe la ville historique de Kong", answer: "Kong est une ville historique du nord-est ivoirien liée aux Dioula." },

// ================= LEADERS HISTORIQUES =================

{ question: "Qui est Abla Pokou", answer: "Abla Pokou est la reine fondatrice du peuple Baoulé." },

{ question: "Qui était Samory Touré", answer: "Samory Touré était un chef militaire ouest-africain ayant résisté à la colonisation française." },

{ question: "Quels leaders sont issus du peuple Bété", answer: "Laurent Gbagbo est une personnalité politique ivoirienne issue du peuple Bété." },

// ================= ORGANISATION SOCIALE =================

{ question: "Comment fonctionne la succession chez les Akan", answer: "La succession est matrilinéaire, transmise par la lignée maternelle." },

{ question: "Quel est le rôle des anciens", answer: "Les anciens conseillent, rendent la justice coutumière et assurent la transmission des traditions." },

{ question: "Qu'est-ce qu'une chefferie traditionnelle", answer: "Une chefferie est une structure politique locale dirigée par un chef coutumier." },

// ================= RITES ET SPIRITUALITE =================

{ question: "Pourquoi les masques sont importants", answer: "Les masques jouent un rôle spirituel, judiciaire et culturel dans plusieurs peuples ivoiriens." },

{ question: "Qu'est-ce que le masque glé", answer: "Le masque glé est un masque sacré chez les Bété utilisé lors de cérémonies." },

{ question: "Qu'est-ce qu'un bois sacré", answer: "Le bois sacré est un espace réservé aux rites d'initiation et aux cérémonies spirituelles." },

// ================= ART ET PATRIMOINE =================

{ question: "Pourquoi les Sénoufo sont réputés en sculpture", answer: "Les Sénoufo sont célèbres pour leurs sculptures sur bois représentant des figures spirituelles." },

{ question: "Qu'est-ce que le pagne Korhogo", answer: "Le pagne Korhogo est un tissu traditionnel décoré de symboles Sénoufo." },

{ question: "Pourquoi les masques Dan sont connus", answer: "Les masques Dan sont reconnus mondialement pour leur finesse artistique." },

// ================= ECONOMIE TRADITIONNELLE =================

{ question: "Quelle culture agricole domine chez les Bété", answer: "Le cacao est une culture dominante chez les Bété." },

{ question: "Quelle activité domine chez les Sénoufo", answer: "L'agriculture et l'artisanat dominent chez les Sénoufo." },

{ question: "Pourquoi les Dioula sont commerçants", answer: "Les Dioula ont historiquement développé des réseaux commerciaux transsahariens." },

// ================= COLONISATION =================

{ question: "Quand la Côte d'Ivoire a-t-elle été colonisée", answer: "La Côte d'Ivoire est devenue colonie française à la fin du XIXe siècle." },

{ question: "Comment les peuples ont résisté à la colonisation", answer: "Plusieurs peuples ont résisté par des guerres, des alliances ou des négociations." },

// ================= MODERNE =================

{ question: "Comment les traditions survivent aujourd'hui", answer: "Les traditions survivent grâce aux chefferies, festivals culturels et transmission orale." },

{ question: "Pourquoi préserver les cultures ivoiriennes", answer: "Préserver les cultures permet de maintenir l'identité, la mémoire et la diversité du pays." }
    ];

    // ========== NORMALISATION ET RECHERCHE ==========
    // Normalise le texte pour la comparaison : minuscules, espaces, accents, apostrophes unifiées, ponctuation finale enlevée
    function normalize(str) {
      return str
        .toLowerCase()
        .trim()
        .replace(/[\u2018\u2019\u201A\u201B\u2032\u2035']/g, "'")
        .replace(/\s+/g, ' ')
        .replace(/[.?!,;:]+$/g, '')
        .trim()
        .normalize('NFD')
        .replace(/[\u0300-\u036f]/g, '');
    }

    // Normalisation « loose » : apostrophes/ponctuation supprimées ; espace = apostrophe (ex. "d ou" -> "dou")
    function normalizeLoose(str) {
      return normalize(str)
        .replace(/['.?!,;:]/g, '')
        .replace(/\s+/g, ' ')
        .replace(/\b([a-z])\s+([a-z]\w*)/g, '$1$2')
        .replace(/\s+/g, ' ')
        .trim();
    }

    // Cherche une réponse locale : correspondance exacte, ou inclusion, puis idem en normalisation loose
    function findLocalAnswer(userQuestion) {
      const nUser = normalize(userQuestion);
      const looseUser = normalizeLoose(userQuestion);
      if (!nUser && !looseUser) return null;
      for (const entry of LOCAL_QA) {
        const nEntry = normalize(entry.question);
        if (nEntry === nUser || nUser.includes(nEntry) || nEntry.includes(nUser))
          return entry.answer;
      }
      for (const entry of LOCAL_QA) {
        const looseEntry = normalizeLoose(entry.question);
        if (looseEntry === looseUser || looseUser.includes(looseEntry) || looseEntry.includes(looseUser))
          return entry.answer;
      }
      return null;
    }

    // ========== UI ==========
    const messagesEl = document.getElementById('messages');
    const formEl = document.getElementById('form');
    const inputEl = document.getElementById('input');
    const btnSend = document.getElementById('btnSend');
    const reflexionBar = document.getElementById('reflexionBar');
    const btnReflexion = document.getElementById('btnReflexion');
    const errorEl = document.getElementById('error');

    let pendingOllamaQuestion = null;
    let isLoading = false;

    function showError(msg) {
      errorEl.textContent = msg;
      errorEl.style.display = 'block';
    }
    function hideError() {
      errorEl.style.display = 'none';
    }

    function appendMessage(role, content) {
      const div = document.createElement('div');
      div.className = 'msg ' + role;
      div.innerHTML = '<div class="bubble">' + escapeHtml(content) + '</div>';
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }
    function appendLoadingBubble() {
      const div = document.createElement('div');
      div.className = 'msg assistant';
      div.id = 'loading-typing';
      div.innerHTML = '<div class="bubble loading">Moyé réfléchit…</div>';
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return div;
    }
    function removeLoadingBubble() {
      const el = document.getElementById('loading-typing');
      if (el) el.remove();
    }
    function escapeHtml(s) {
      const p = document.createElement('p');
      p.textContent = s;
      return p.innerHTML;
    }

    const REFLEXION_DELAY_MS = 10000; // 10 secondes pour simuler un temps de réponse réaliste

    // Simule l'appel Ollama (dans le prototype, affiche un message ; à remplacer par un vrai fetch vers /api/v1/moye)
    function callOllama(question, onDone) {
      isLoading = true;
      btnReflexion.disabled = true;
      reflexionBar.querySelector('span').textContent = 'Appel Ollama en cours…';
      // En production : fetch(MOYE_CHAT_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ question, quick: false }) })
      setTimeout(function () {
        onDone("Dans ce prototype, l'appel à Ollama n'est pas branché. Dans l'app React, le bouton « Réflexion Profonde » envoie bien la question à l'API /api/v1/moye avec quick: false.");
        reflexionBar.querySelector('span').textContent = 'Réponse plus détaillée avec Ollama';
        reflexionBar.style.display = 'none';
        pendingOllamaQuestion = null;
        isLoading = false;
        btnReflexion.disabled = false;
      }, 800);
    }

    formEl.addEventListener('submit', function (e) {
      e.preventDefault();
      const text = inputEl.value.trim();
      if (!text || isLoading) return;
      appendMessage('user', text);
      inputEl.value = '';
      hideError();
      pendingOllamaQuestion = null;
      reflexionBar.style.display = 'none';

      isLoading = true;
      inputEl.disabled = true;
      btnSend.disabled = true;
      appendLoadingBubble();

      const answer = findLocalAnswer(text);
      setTimeout(function () {
        removeLoadingBubble();
        if (answer !== null) {
          appendMessage('assistant', answer);
        } else {
          appendMessage('assistant', NO_MATCH_SUGGESTION);
          pendingOllamaQuestion = text;
          reflexionBar.style.display = 'flex';
        }
        isLoading = false;
        inputEl.disabled = false;
        btnSend.disabled = false;
        messagesEl.scrollTop = messagesEl.scrollHeight;
      }, REFLEXION_DELAY_MS);
    });

    btnReflexion.addEventListener('click', function () {
      if (!pendingOllamaQuestion || isLoading) return;
      callOllama(pendingOllamaQuestion, function (reply) {
        appendMessage('assistant', reply);
        messagesEl.scrollTop = messagesEl.scrollHeight;
      });
    });
  </script>
</body>
</html>
