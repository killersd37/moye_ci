services:
  # ============================================================
  # PostgreSQL Database
  # ============================================================
  postgres:
    image: postgres:16-alpine
    container_name: moye_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: moye_user
      POSTGRES_PASSWORD: moye_password
      POSTGRES_DB: moye_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U moye_user -d moye_db" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================
  # MOYÉ Backend API
  # ============================================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: moye_backend
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://moye_user:moye_password@postgres:5432/moye_db
      - JWT_SECRET=${JWT_SECRET:-moye-super-secret-key-production}
      - JWT_EXPIRES_IN=7d
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET:-moye-refresh-secret-key}
      - JWT_REFRESH_EXPIRES_IN=30d
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost:3000}
      - UPLOAD_DIR=./uploads
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - LOG_LEVEL=info
    volumes:
      - backend_uploads:/app/uploads
      - backend_logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "node", "-e", "require('http').get('http://localhost:4000/health', r => r.statusCode === 200 ? process.exit(0) : process.exit(1))" ]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3

  # ============================================================
  # Frontend (Vite/React)
  # ============================================================
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: moye_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

  # ============================================================
  # Adminer - Interface DB (développement)
  # ============================================================
  adminer:
    image: adminer:4
    container_name: moye_adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    profiles:
      - dev

volumes:
  postgres_data:
  backend_uploads:
  backend_logs:
